name: Deploy Docker Swarm Cluster

on:
  workflow_dispatch:
    inputs:
      action:
        description: '操作类型'
        required: true
        default: 'create-all'
        type: choice
        options:
          - create-all
          - create-one
          - status

jobs:
  create-codespaces:
    runs-on: ubuntu-latest
    steps:
      - name: Create all 5 Codespaces
        if: github.event.inputs.action == 'create-all'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          for i in 1 2 3 4 5; do
            echo "Creating docker$i..."
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/codespaces" \
              -d "{
                \"ref\": \"main\",
                \"location\": \"WestUs\",
                \"machine\": \"basicLinux32gb\",
                \"display_name\": \"docker$i\"
              }")
            
            if echo "$RESPONSE" | grep -q "id"; then
              echo "✅ docker$i 创建成功"
            else
              echo "❌ docker$i 创建失败: $RESPONSE"
            fi
            
            sleep 5
          done
          
      - name: Create single Codespace
        if: github.event.inputs.action == 'create-one'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/codespaces" \
            -d "{
              \"ref\": \"main\",
              \"location\": \"WestUs\",
              \"machine\": \"basicLinux32gb\",
              \"display_name\": \"docker-new-$(date +%H%M)\"
            }")
          echo "$RESPONSE"
          
      - name: Check Codespaces status
        if: github.event.inputs.action == 'status'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          curl -s -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/codespaces" | jq '.'
