name: Deploy Docker Swarm Cluster

on:
  workflow_dispatch:
    inputs:
      action:
        description: '操作类型'
        required: true
        default: 'create-all'
        type: choice
        options:
          - create-all
          - create-one
          - status
          - test
  push:
    branches:
      - main

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Test scripts syntax
        run: |
          echo "测试脚本语法..."
          for script in scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "检查 $script"
              bash -n "$script" || exit 1
            fi
          done
          echo "✅ 所有脚本语法正确"
          
      - name: Test Docker installation
        run: |
          echo "测试Docker安装..."
          curl -fsSL https://get.docker.com | sudo sh
          docker --version
          echo "✅ Docker安装成功"
          
      - name: Test Tailscale installation
        run: |
          echo "测试Tailscale安装..."
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          tailscale version || echo "Tailscale已安装"
          echo "✅ Tailscale安装成功"

  create-codespaces:
    runs-on: ubuntu-latest
    needs: test-scripts
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'create-all' || github.event.inputs.action == 'create-one')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create all Codespaces
        if: github.event.inputs.action == 'create-all'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "开始创建2个Codespaces..."
          for i in 1 2; do
            echo "创建 docker$i..."
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/codespaces" \
              -d "{\n                \"ref\": \"main\",\n                \"display_name\": \"docker$i\"\n              }")
            
            if echo "$RESPONSE" | grep -q '"id"'; then
              CODESPACE_ID=$(echo "$RESPONSE" | jq -r '.id')
              echo "✅ docker$i 创建成功 (ID: $CODESPACE_ID)"
            else
              ERROR_MSG=$(echo "$RESPONSE" | jq -r '.message // .error // "未知错误"')
              echo "❌ docker$i 创建失败: $ERROR_MSG"
            fi
            
            sleep 3
          done
          
      - name: Create single Codespace
        if: github.event.inputs.action == 'create-one'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/codespaces" \
            -d "{\n              \"ref\": \"main\",\n              \"display_name\": \"docker-new-$(date +%H%M)\"\n            }")
          echo "$RESPONSE" | jq '.'
          
  check-status:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'status'
    steps:
      - name: Check Codespaces status
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "检查Codespaces状态..."
          curl -s -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/codespaces" | jq '.codespaces[] | {name: .display_name, state: .state, created: .created_at}'
